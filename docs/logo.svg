<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160" role="img" aria-label="PM5 Dashboard">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4cc2ff"/>
      <stop offset="1" stop-color="#56f9b3"/>
    </linearGradient>
  </defs>
  <!-- Rounded background square -->
  <rect x="6" y="6" width="308" height="148" rx="18" fill="#0b0d12" stroke="#1d2435" stroke-width="2"/>
  <!-- Force curve arc — asymmetric bell, peak slightly past middle -->
  <path d="M 36 102
           C 70 102, 90 36, 152 28
           C 214 36, 240 80, 284 100"
        fill="none"
        stroke="url(#g)"
        stroke-width="4"
        stroke-linecap="round"/>
  <!-- Baseline tick -->
  <line x1="36" y1="104" x2="284" y2="104" stroke="#1d2435" stroke-width="2"/>
  <!-- Wordmark -->
  <text x="160" y="138"
        text-anchor="middle"
        font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif"
        font-weight="800"
        font-size="22"
        letter-spacing="3"
        fill="#e8ecf3">PM5 DASHBOARD</text>
</svg>
